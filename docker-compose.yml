x-service-templates: &gateway-build
  #image: sure44e/rinha-debut:latest
  build: .
  depends_on:
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: '0.4'
        memory: '80MB'
  environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
  networks:
    - api
    - payment-processor


services:
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    command: ["haproxy", "-f", "/usr/local/etc/haproxy/haproxy.cfg", "-W"]
    ports:
      - "9999:80"
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - gateway-1
      - gateway-2
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '20MB'
    networks:
      - api

  gateway-1:
    <<: *gateway-build
    container_name: gateway-1
    hostname: gateway-1

  gateway-2:
    <<: *gateway-build
    container_name: gateway-2
    hostname: gateway-2

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: [
      "redis-server",
      "--save 300 10",
      "--appendonly no",
      "--maxmemory 20mb",
      "--maxmemory-policy allkeys-lru"
    ]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '80MB'
    networks:
      - api

networks:
  api:
    name: api
    driver: bridge
  payment-processor:
    external: true


